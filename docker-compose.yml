version: "3.9"
services:
  db:
    image: postgres:16
    container_name: callservice_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: callservice
      POSTGRES_PASSWORD: callservice_pw
      POSTGRES_DB: callservice
    volumes:
      - callservice_pg:/var/lib/postgresql/data
volumes:
  callservice_pg: